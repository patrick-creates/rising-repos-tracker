name: Collect Repo Stats

on:
  schedule:
    - cron: "17 5 * * *"   # daily at 05:17 UTC — off-peak slot for reliable timing
  workflow_dispatch:        # also allow manual runs

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to commit data back

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Collect stats
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/collect.js

      - name: Update README
        run: node scripts/update-readme.js

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ README.md
          git diff --cached --quiet || git commit -m "chore: update stats $(date -u +%Y-%m-%d)"
          git push
